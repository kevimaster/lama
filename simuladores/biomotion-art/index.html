.ch:active{transform:scale(.95)}.ch.on{border-color:var(--tea);background:rgba(61,158,170,.12);color:var(--tx)}.ch.son{border-color:var(--grn);background:rgba(93,171,114,.1);color:var(--tx)}

/* 8 Renderers */
function rRings(C,w,h,d,fp,dn,ch,br){var p=pal(PALS.rings,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*3);C.fillRect(0,0,w,h);var dnF=dn/100,dnE=dnF*dnF*dnF,st=Math.max(1,Math.floor(d.length/(5+dnE*d.length*.8))),pts=[];for(var i=0;i<d.length;i+=st)pts.push(d[i]);var aX=.6+fp.eX*.8+fp.eZ*.4,aY=.6+fp.eY*.8+fp.eZ*.4,cx=w/2,cy=h/2,mR=Math.min(w,h)*.44,wb=.03+fp.turb*.5,hm=1+fp.domI+Math.floor(fp.zcR*15),thM=(.2+dnF*1.5)+fp.burstR*12;for(var i=pts.length-1;i>=0;i--){var dd=pts[i],t=i/pts.length,r=mR*(1-t*.96),hu=p.hues[ch>.3?Math.floor(t*p.hues.length*2.5)%p.hues.length:0],al=cAl(.3+(1-t)*.7,ch);C.beginPath();for(var s=0;s<=180;s++){var a=(s/180)*Math.PI*2,v=(1+fbm(a*2.5+dd.x*4,t*10+dd.z*4,fp.seed)*wb)*(1+dd.mag*.2*Math.sin(a*hm))*(1+dd.x*.25*Math.cos(a)+dd.y*.25*Math.sin(a))*(1+fp.skX*.08*Math.cos(a))*(1+fp.cXZ*.12*Math.sin(a*2));C.lineTo(cx+Math.cos(a)*r*v*aX,cy+Math.sin(a)*r*v*aY)}C.closePath();C.strokeStyle=HS(hu,cSat(p.sat,ch),p.li+br*8+(dd.mag-.5)*25,al);C.lineWidth=.2+dd.mag*thM;C.stroke();if(i%3==0){C.fillStyle=HS(hu,cSat(p.sat,ch),p.li+br*5,al*.04);C.fill()}}}
function rFlower(C,w,h,d,fp,dn,ch,br){var p=pal(PALS.flower,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*3);C.fillRect(0,0,w,h);var dnF=dn/100,st=Math.max(1,Math.floor(d.length/(3+dnF*dnF*dnF*d.length*.7))),cx=w/2,cy=h/2,mR=Math.min(w,h)*.43,ga=(137.508+fp.eX*30-fp.eY*20)*Math.PI/180,tight=.3+fp.zcR*5,pSc=.8+fp.kX*.08,pE=.4+Math.abs(fp.cXZ)*.8,szM=.5+dnF*1.2,idx=0;for(var i=0;i<d.length;i+=st){var dd=d[i],t=i/d.length,ang=idx*ga*pSc+dd.x*1.2+fp.seed*.01,dist=Math.pow(t,tight)*mR*(.2+dd.mag*.6),px=cx+Math.cos(ang)*dist,py=cy+Math.sin(ang)*dist,sz=(1.5+dd.mag*12+Math.abs(dd.z)*6)*(.2+t)*(w/700)*szM,hu=p.hues[ch>.2?Math.floor((ang/(Math.PI*2)*p.hues.length+dd.z*4)+200)%p.hues.length:0],al=cAl(.2+(1-t)*.8,ch),pw=sz*pE*(.3+Math.abs(dd.x)*.4),ph=sz*(.5+Math.abs(dd.z)*.5);C.save();C.translate(px,py);C.rotate(ang+dd.y*1.5);C.beginPath();C.moveTo(0,-ph);C.bezierCurveTo(pw*1.4,-ph*.3,pw*1.2,ph*.6,0,ph);C.bezierCurveTo(-pw*1.2,ph*.6,-pw*1.4,-ph*.3,0,-ph);var g=C.createRadialGradient(0,0,0,0,0,sz);g.addColorStop(0,HS(hu,cSat(p.sat+15,ch),p.li+br*10+20+(dd.mag-.5)*30,al));g.addColorStop(1,HS((hu+30*ch)%360,cSat(p.sat-15,ch),p.li-15,al*.1));C.fillStyle=g;C.fill();C.restore();idx++}}
function rStars(C,w,h,d,fp,dn,ch,br){var dnF=dn/100,p=pal(PALS.stars,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*2);C.fillRect(0,0,w,h);var st=Math.max(1,Math.floor(d.length/(3+dnF*dnF*dnF*d.length*.6))),cx=w/2,cy=h/2,mR=Math.min(w,h)*.42,szM=.4+dnF,idx=0;for(var i=0;i<d.length;i+=st){var dd=d[i],t=idx/(d.length/st),angle=t*Math.PI*2*(2+fp.turb*8)+dd.x*2+fp.seed*.05,dist=(50+dd.mag*mR*.3+t*mR*.35)*(w/700),px=cx+Math.cos(angle)*dist*(.7+fp.eX*.5),py=cy+Math.sin(angle)*dist*(.7+fp.eY*.5),rays=4+Math.floor(fp.kX*.5+dd.mag*3),sz=(1+dd.mag*6+Math.abs(dd.z)*3)*(w/700)*szM,hu=p.hues[ch>.2?Math.floor(t*p.hues.length*3)%p.hues.length:0],al=cAl(.4+(1-t)*.6,ch);C.save();C.translate(px,py);C.rotate(angle+dd.z);C.beginPath();for(var r=0;r<=rays*2;r++){var a2=(r/(rays*2))*Math.PI*2;C.lineTo(Math.cos(a2)*(r%2==0?sz:sz*(.2+fp.turb*.3)),Math.sin(a2)*(r%2==0?sz:sz*(.2+fp.turb*.3)))}C.closePath();C.fillStyle=HS(hu,cSat(p.sat,ch),p.li+br*10+dd.mag*20,al);C.fill();if(ch>.3){var g=C.createRadialGradient(0,0,0,0,0,sz*2);g.addColorStop(0,HS(hu,cSat(p.sat,ch),p.li+30+br*8,al*.4*ch));g.addColorStop(1,HS(hu,p.sat,p.li,0));C.fillStyle=g;C.beginPath();C.arc(0,0,sz*2,0,Math.PI*2);C.fill()}C.restore();idx++}}
function rRivers(C,w,h,d,fp,dn,ch,br){var dnF=dn/100,p=pal(PALS.rivers,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*2);C.fillRect(0,0,w,h);var st=Math.max(1,Math.floor(d.length/(3+dnF*dnF*d.length*.5))),streams=Math.floor(2+dnF*10+fp.turb*4),meander=.04+fp.zcR*.4+fp.cXZ*.05;for(var s=0;s<streams;s++){var rx=w*(s/streams)+w/(streams*2),ry=0,ang=Math.PI/2+fp.skX*.3+(s-streams/2)*.1,perS=Math.floor(d.length/st/streams);C.beginPath();C.moveTo(rx,ry);for(var j=0;j<perS;j++){var di=(s*perS+j)*st;if(di>=d.length)break;var dd=d[di%d.length],sl=(4+dd.mag*6)*(w/600);ang+=dd.x*meander+fbm(rx*.005,ry*.005,fp.seed+s)*.08;rx+=Math.cos(ang)*sl;ry+=Math.sin(ang)*sl;C.lineTo(rx,ry)}var hu=p.hues[ch>.2?s%p.hues.length:0];C.strokeStyle=HS(hu,cSat(p.sat,ch),p.li+br*8,cAl(.5,ch));C.lineWidth=(2+dnF*6)+fp.burstR*8;C.lineCap='round';C.stroke();C.strokeStyle=HS(hu,cSat(p.sat-10,ch),p.li-10+br*4,cAl(.15,ch));C.lineWidth=(8+dnF*12);C.stroke()}}
function rBranches(C,w,h,d,fp,dn,ch,br){var dnF=dn/100,p=pal(PALS.branches,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*2);C.fillRect(0,0,w,h);var st=Math.max(1,Math.floor(d.length/(3+dnF*dnF*d.length*.5)));function branch(x,y,ang,thick,depth,di,maxD){if(depth>maxD||thick<.3||di>=d.length)return;var segLen=Math.floor(5+dnF*12+d.length/st/(maxD*3));for(var j=0;j<segLen;j++){var i2=(di+j*st)%d.length,dd=d[i2],t=j/segLen,sl=(3+dd.mag*5)*(1-t*.3)*(w/700)*(1-depth/maxD*.4);ang+=dd.x*(.03+fp.turb*.15)+fbm(x*.01,y*.01,fp.seed+depth)*.06;var nx=x+Math.cos(ang)*sl,ny=y+Math.sin(ang)*sl,hu=p.hues[ch>.2?(depth*2+Math.floor(t*3))%p.hues.length:0],al=cAl(.4+(1-depth/maxD)*.6,ch);C.beginPath();C.moveTo(x,y);C.lineTo(nx,ny);C.strokeStyle=HS(hu,cSat(p.sat,ch),p.li+br*6+(dd.mag-.5)*15,al);C.lineWidth=thick*(1-t*.4);C.lineCap='round';C.stroke();if(j>2&&j%Math.max(2,Math.floor(6-dnF*4))==0&&Math.abs(dd.x)>.15)branch(nx,ny,ang+(dd.x>0?.5:-.5),thick*.55,depth+1,i2+st*3,maxD);x=nx;y=ny}if(depth>maxD-2){C.beginPath();C.arc(x,y,thick*1.5+1+dnF*3,0,Math.PI*2);C.fillStyle=HS(p.hues[ch>.2?(depth+3)%p.hues.length:0],cSat(p.sat+15,ch),p.li+15+br*8,cAl(.4,ch));C.fill()}}var trunks=Math.floor(1+dnF*4+fp.burstR*3),maxD=Math.floor(2+dnF*4+fp.turb*2);for(var t=0;t<trunks;t++)branch(w*(.15+t*.7/Math.max(1,trunks-1)),h*.85,-Math.PI/2+fp.skX*.2+(t-trunks/2)*.15,3+dnF*6+fp.burstR*4,0,t*Math.floor(d.length/trunks),maxD)}
function rGalaxy(C,w,h,d,fp,dn,ch,br){var dnF=dn/100,dnE=dnF*dnF*dnF,p=pal(PALS.galaxy,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*2);C.fillRect(0,0,w,h);var cx=w*(.5+fp.skX*.06),cy=h*(.5+fp.skY*.06),mR=Math.min(w,h)*.44,st=Math.max(1,Math.floor(d.length/(3+dnE*d.length*.8))),arms=2+Math.floor(fp.burstR*4+fp.kX*.3),twist=2+fp.turb*6,spread=.1+fp.zcR*2,szM=.3+dnF*1.2;var cg=C.createRadialGradient(cx,cy,0,cx,cy,mR*.3);cg.addColorStop(0,HS(p.hues[0],cSat(p.sat,ch),p.li+30+br*10,.3+ch*.3));cg.addColorStop(1,HS(p.hues[0],cSat(p.sat,ch),p.li,0));C.fillStyle=cg;C.fillRect(0,0,w,h);C.globalCompositeOperation='lighter';var idx=0;for(var i=0;i<d.length;i+=st){var dd=d[i],t=idx/(d.length/st);for(var a=0;a<arms;a++){var bA=(a/arms)*Math.PI*2,r=t*mR*(.3+dd.mag*.5),sA=bA+t*twist+dd.x*spread,nf=fbm(sA,t*5,fp.seed+a)*r*.08,px=cx+Math.cos(sA)*(r+nf)*(.7+fp.eX*.5)+dd.x*3,py=cy+Math.sin(sA)*(r+nf)*(.7+fp.eY*.5)+dd.y*3,sz=(.5+dd.mag*3+t*1.5)*(w/700)*szM,hu=p.hues[ch>.2?(a*2+Math.floor(t*p.hues.length))%p.hues.length:0],al=cAl((.3+(1-t)*.7)*(.5+dd.mag*.5),ch);C.beginPath();C.arc(px,py,sz,0,Math.PI*2);C.fillStyle=HS(hu,cSat(p.sat,ch),p.li+br*8+dd.mag*25,al);C.fill()}idx++}C.globalCompositeOperation='source-over'}
function rWaves(C,w,h,d,fp,dn,ch,br){var dnF=dn/100,p=pal(PALS.waves,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*2);C.fillRect(0,0,w,h);var st=Math.max(1,Math.floor(d.length/(3+dnF*dnF*d.length*.5))),layers=Math.floor(3+dnF*12+fp.turb*4),freq=2+fp.zcR*20,amp=.04+fp.burstR*.2+fp.magSpr*.1+dnF*.04;for(var L=0;L<layers;L++){var t=L/layers,baseY=h*(.12+t*.76),hu=p.hues[ch>.2?L%p.hues.length:0],al=cAl(.4+(1-t)*.6,ch);C.beginPath();C.moveTo(0,h);for(var x=0;x<=w;x+=2){var di=Math.floor((x/w)*d.length/st)%d.length,dd=d[Math.min(di,d.length-1)];C.lineTo(x,baseY+Math.sin(x/w*Math.PI*freq+L*1.5+fp.seed*.01)*h*amp+fbm(x*.003+L,t*5,fp.seed+L)*h*.04+dd.mag*h*.03+dd.x*h*.02)}C.lineTo(w,h);C.closePath();var g=C.createLinearGradient(0,baseY-h*amp,0,baseY+h*amp*2);g.addColorStop(0,HS(hu,cSat(p.sat,ch),p.li+15+br*8,al));g.addColorStop(1,HS(hu,cSat(p.sat-10,ch),p.li-15+br*4,al*.3));C.fillStyle=g;C.fill()}}
function rPlanets(C,w,h,d,fp,dn,ch,br){var dnF=dn/100,p=pal(PALS.planets,fp);C.fillStyle=HS(p.bg[0],p.bg[1],p.bg[2]+br*2);C.fillRect(0,0,w,h);for(var i=0;i<Math.floor(30+dnF*200);i++){C.beginPath();C.arc(Math.random()*w,Math.random()*h,.2+Math.random()*(1+dnF),0,Math.PI*2);C.fillStyle=HS(0,0,80+Math.random()*20,cAl(.3,ch));C.fill()}var mR=Math.min(w,h)*.4,pC=Math.floor(2+dnF*7+fp.turb*3),cx=w/2,cy=h/2;for(var pi=0;pi<pC;pi++){var start=Math.floor(pi*d.length/pC),chunk=d.slice(start,Math.floor((pi+1)*d.length/pC));if(chunk.length<2)continue;var aM=chunk.reduce(function(s,v){return s+v.mag},0)/chunk.length,aX=chunk.reduce(function(s,v){return s+v.x},0)/chunk.length,aZ=chunk.reduce(function(s,v){return s+v.z},0)/chunk.length;var oR=(30+pi*mR*.2+aM*30)*(w/700),oA=(pi/pC)*Math.PI*2+fp.seed*.01+aX,px=cx+Math.cos(oA)*oR*(.7+fp.eX*.5),py=cy+Math.sin(oA)*oR*(.7+fp.eY*.5),radius=(5+aM*20+Math.abs(aZ)*8+dnF*8)*(w/700),hu=p.hues[(pi*2)%p.hues.length];C.beginPath();C.ellipse(cx,cy,oR*(.7+fp.eX*.5),oR*(.7+fp.eY*.5),0,0,Math.PI*2);C.strokeStyle=HS(hu,cSat(20,ch),30,cAl(.15,ch));C.lineWidth=.5;C.stroke();var bands=Math.floor(2+dnF*5);for(var b=bands;b>=0;b--){var bf=b/bands;C.beginPath();C.arc(px,py,radius*(1-.12*bf),0,Math.PI*2);C.fillStyle=HS(ch>.2?(hu+bf*20+aZ*30)%360:hu,cSat(p.sat,ch),p.li+br*8+(aM-.5)*20-bf*8,cAl(.6+bf*.3,ch));C.fill()}}var sg=C.createRadialGradient(cx,cy,0,cx,cy,20+dnF*10);sg.addColorStop(0,HS(40,cSat(80,ch),90+br*5,.7+ch*.2));sg.addColorStop(1,HS(20,60,50,0));C.fillStyle=sg;C.beginPath();C.arc(cx,cy,20+dnF*10,0,Math.PI*2);C.fill()}

var REND={rings:rRings,flower:rFlower,stars:rStars,rivers:rRivers,branches:rBranches,galaxy:rGalaxy,waves:rWaves,planets:rPlanets};
var STY=[{id:'rings',l:'Anillos',c:'#8B6914',e:'🪵'},{id:'flower',l:'Flor',c:'#b06480',e:'🌸'},{id:'stars',l:'Estrellas',c:'#6688cc',e:'⭐'},{id:'rivers',l:'Ríos',c:'#3d9eaa',e:'🌊'},{id:'branches',l:'Ramas',c:'#7a6030',e:'🌿'},{id:'galaxy',l:'Galaxia',c:'#9966cc',e:'🌌'},{id:'waves',l:'Olas',c:'#4488aa',e:'🌀'},{id:'planets',l:'Planetas',c:'#cc7744',e:'🪐'}];

/* ══ State ══ */
var style='rings',activeKey='acc_15_15',density=70,chroma=80,brightness=50,multiply=1;
var customFiles={};// key -> {label, data}

function getActive(){if(customFiles[activeKey])return customFiles[activeKey].data;if(SAMPLES[activeKey])return SAMPLES[activeKey].data;return SAMPLES.acc_15_15.data}

/* ══ Draw ══ */
function draw(){var c=$('mc'),raw=getActive(),res=analyze(raw),data=res.data,fp=res.fp;
  var sz=Math.min(c.parentElement.offsetWidth-16,520);c.width=sz;c.height=sz;var ctx=c.getContext('2d');
  ctx.fillStyle='#07070c';ctx.fillRect(0,0,sz,sz);var br2=(brightness-50)/50,ch2=chroma/100;
  if(multiply<=1){REND[style](ctx,sz,sz,data,fp,density,ch2,br2)}
  else{var cell=sz/multiply;for(var r=0;r<multiply;r++)for(var co=0;co<multiply;co++){ctx.save();ctx.beginPath();ctx.rect(co*cell+1,r*cell+1,cell-2,cell-2);ctx.clip();ctx.translate(co*cell,r*cell);var vfp={};for(var k in fp)vfp[k]=fp[k];vfp.seed=(fp.seed+r*137+co*89)%1000;REND[style](ctx,cell,cell,data,vfp,density,ch2,br2);ctx.restore()}}
  // Pre-load download
  try{var a=$('dlA');a.href=c.toDataURL('image/png');a.download='biomotion_'+style+'_x'+multiply+'_'+Date.now()+'.png'}catch(e){}
  // Fingerprint
  $('fp').innerHTML='<span style="color:var(--grn)">●</span><span>E:X'+(fp.eX*100).toFixed(0)+'% Y'+(fp.eY*100).toFixed(0)+'% Z'+(fp.eZ*100).toFixed(0)+'%</span><span>Sk:'+(fp.skX>0?'+':'')+fp.skX.toFixed(1)+'</span><span>Ku:'+fp.kX.toFixed(1)+'</span><span>×'+multiply+'</span>'}
var dTO;function qD(){clearTimeout(dTO);dTO=setTimeout(draw,80)}

/* ══ Data Row with add/remove ══ */
function buildDR(){var row=$('dR');row.innerHTML='';
  // Add button
  var ab=document.createElement('button');ab.className='ch ch-add';ab.textContent='＋ CSV';ab.onclick=function(){$('fi').click()};row.appendChild(ab);
  // Custom files (removable)
  for(var k in customFiles){(function(key){
    var wrap=document.createElement('span');wrap.style.cssText='display:flex;align-items:center;gap:2px;flex-shrink:0';
    var b=document.createElement('button');b.className='ch'+(activeKey===key?' on':'');
    b.textContent='📄 '+customFiles[key].label;
    b.onclick=function(){activeKey=key;buildDR();qD()};
    var del=document.createElement('button');
    del.style.cssText='width:20px;height:20px;border-radius:50%;border:none;background:#c33;color:#fff;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;padding:0';
    del.textContent='✕';del.title='Eliminar '+customFiles[key].label;
    del.onclick=function(){delete customFiles[key];if(activeKey===key){activeKey='acc_15_15'}buildDR();qD();toast('🗑 Archivo eliminado')};
    wrap.appendChild(b);wrap.appendChild(del);row.appendChild(wrap)})(k)}
  // Built-in samples
  for(var k in SAMPLES){(function(key){
    var b=document.createElement('button');b.className='ch'+(activeKey===key&&!customFiles[activeKey]?' on':'');
    b.textContent=SAMPLES[key].label;b.onclick=function(){activeKey=key;buildDR();qD()};
    row.appendChild(b)})(k)}}

function buildSR(){var row=$('sR');row.innerHTML='';
  STY.forEach(function(s){var b=document.createElement('button');b.className='ch'+(style===s.id?' son':'');
    b.innerHTML='<span style="font-size:.7rem">'+s.e+'</span>'+s.l;
    b.onclick=function(){style=s.id;buildSR();qD()};row.appendChild(b)})}

/* ══ File handling (multiple + remove) ══ */
$('fi').onchange=function(e){
  var files=e.target.files;if(!files.length)return;
  var loaded=0;
  for(var i=0;i<files.length;i++){(function(f){
    var reader=new FileReader();
    reader.onload=function(ev){
      var raw=parseCSV(ev.target.result);
      if(raw.length<5){toast('⚠️ '+f.name+': datos insuficientes');return}
      var key='custom_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
      var label=f.name.replace(/\.[^.]+$/,'');if(label.length>15)label=label.substr(0,15)+'…';
      customFiles[key]={label:label,data:raw};
      activeKey=key;loaded++;
      if(loaded>=files.length){buildDR();qD();toast('📊 '+files.length+' archivo(s) cargado(s)')}};
    reader.readAsText(f)})(files[i])}
  e.target.value=''};

/* ══ Sliders ══ */
$('dn').oninput=function(e){density=+e.target.value;$('dnV').textContent=density+'%'};
$('ch').oninput=function(e){chroma=+e.target.value;$('chV').textContent=chroma+'%'};
$('br').oninput=function(e){brightness=+e.target.value;$('brV').textContent=brightness+'%'};
$('mu').oninput=function(e){multiply=+e.target.value;$('muV').textContent='×'+multiply};
['dn','ch','br','mu'].forEach(function(id){$(id).onchange=qD});

/* ══ Init ══ */
buildDR();buildSR();draw();
</script></body></html>
