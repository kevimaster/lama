    button {

      color: #fff;
      border: none;
      padding: .5rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: background .2s;
    }
    button:hover { background: #52b788; }
    button.secundario { background: #30363d; color: #e6edf3; }

    footer {
