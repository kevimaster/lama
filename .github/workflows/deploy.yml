name: Deploy LAMA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Build React simulators ──────────────────────────────────────────────────
  build-react:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        simulator:
          - anatomia-sistema-algoritmico
          - ensamblaje-sociotecnico
          - sesgos-narrativas-historicas
          - algoritmos-card-game
          - analizador-sesgos-busquedas
          - mi-apuesta-editorial
          - panoptico-digital
          - data-mine-simulador
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build ${{ matrix.simulator }}
        working-directory: simuladores/${{ matrix.simulator }}
        run: npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.simulator }}
          path: simuladores/${{ matrix.simulator }}/dist

  # ── Assemble and deploy ─────────────────────────────────────────────────────
  deploy:
    needs: build-react
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download React build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: _artifacts

      - name: Assemble site
        run: |
          mkdir -p _site
          # Portal raíz
          cp index.html _site/index.html
          # Dominio personalizado
          cp CNAME _site/CNAME
          # Assets (logo, imágenes)
          if [ -d assets ]; then cp -r assets _site/assets; fi
          # HTML simulators
          for dir in simuladores/*/; do
            sim=$(basename "$dir")
            if [ -f "$dir/index.html" ] && [ ! -f "$dir/vite.config.js" ] && [ ! -f "$dir/vite.config.ts" ]; then
              mkdir -p "_site/simuladores/$sim"
              cp "$dir/index.html" "_site/simuladores/$sim/index.html"
              echo "  HTML: $sim"
            fi
          done
          # React simulators (dist from build)
          for artifact in _artifacts/dist-*/; do
            sim=$(basename "$artifact" | sed 's/^dist-//')
            mkdir -p "_site/simuladores/$sim"
            cp -r "$artifact." "_site/simuladores/$sim/"
            echo "  React: $sim"
          done

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
