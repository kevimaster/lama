name: Deploy LAMA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Deploy (solo HTML por ahora) ────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # Portal raíz
          cp index.html _site/index.html
          # Dominio personalizado
          cp CNAME _site/CNAME
          # Copiar todos los simuladores que tengan index.html
          for dir in simuladores/*/; do
            sim=$(basename "$dir")
            if [ -f "$dir/index.html" ]; then
              mkdir -p "_site/simuladores/$sim"
              cp "$dir/index.html" "_site/simuladores/$sim/index.html"
              echo "  ✓ $sim"
            fi
          done

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

# ── NOTA: cuando haya simuladores React listos para build, agregar job ───────
# build-react con matrix de simuladores y luego incluir sus dist/ en _site
